<script src="nav.js"></script>
<script>
  const DIAGRAM_W = 3100, DIAGRAM_H = 620;
  let scale=1, tx=0, ty=0, isDragging=false, lastX=0, lastY=0;
  const board=document.getElementById('board'), scene=document.getElementById('scene'), label=document.getElementById('zoom-label');

  function applyT(){ scene.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`); label.textContent=Math.round(scale*100)+'%'; }

  function fitToScreen(){
    const bw=board.clientWidth, bh=board.clientHeight, p=40;
    scale=Math.min((bw-p*2)/DIAGRAM_W,(bh-p*2)/DIAGRAM_H);
    tx=(bw-DIAGRAM_W*scale)/2; ty=(bh-DIAGRAM_H*scale)/2; applyT();
  }
  function resetZoom(){ scale=1; tx=(board.clientWidth-DIAGRAM_W)/2; ty=(board.clientHeight-DIAGRAM_H)/2; applyT(); }
  function zoomAt(mx,my,f){ const sx=(mx-tx)/scale,sy=(my-ty)/scale; scale=Math.min(5,Math.max(0.07,scale*f)); tx=mx-sx*scale; ty=my-sy*scale; applyT(); }
  function zoomIn(){ zoomAt(board.clientWidth/2,board.clientHeight/2,1.25); }
  function zoomOut(){ zoomAt(board.clientWidth/2,board.clientHeight/2,1/1.25); }

  board.addEventListener('wheel',e=>{ e.preventDefault(); const r=board.getBoundingClientRect(); zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12); },{passive:false});
  board.addEventListener('mousedown',e=>{ if(e.button!==0)return; isDragging=true; lastX=e.clientX; lastY=e.clientY; board.classList.add('dragging'); });
  window.addEventListener('mousemove',e=>{ if(!isDragging)return; tx+=e.clientX-lastX; ty+=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; applyT(); });
  window.addEventListener('mouseup',()=>{ isDragging=false; board.classList.remove('dragging'); });
  board.addEventListener('dblclick',e=>{ const r=board.getBoundingClientRect(); zoomAt(e.clientX-r.left,e.clientY-r.top,1.8); });

  let ltd=null;
  board.addEventListener('touchstart',e=>{ if(e.touches.length===2){ ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); } else if(e.touches.length===1){ isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; } },{passive:true});
  board.addEventListener('touchmove',e=>{ e.preventDefault(); if(e.touches.length===2&&ltd){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); const r=board.getBoundingClientRect(); zoomAt((e.touches[0].clientX+e.touches[1].clientX)/2-r.left,(e.touches[0].clientY+e.touches[1].clientY)/2-r.top,d/ltd); ltd=d; } else if(e.touches.length===1&&isDragging){ tx+=e.touches[0].clientX-lastX; ty+=e.touches[0].clientY-lastY; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; applyT(); } },{passive:false});
  board.addEventListener('touchend',()=>{ ltd=null; isDragging=false; });

  window.addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return; if(e.key==='f'||e.key==='F')fitToScreen(); if(e.key==='='||e.key==='+')zoomIn(); if(e.key==='-')zoomOut(); if(e.key==='0')resetZoom(); });

  fitToScreen();
</script>
</body>
</html>
