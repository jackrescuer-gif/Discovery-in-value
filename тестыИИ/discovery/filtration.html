<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Фильтрация — Поток создания ценности</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>var CURRENT_PAGE = 'filtration.html';</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .page-hero {
      background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
      color: #fff;
      padding: 40px 40px 36px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(30, 58, 95, 0.15);
      margin-bottom: 32px;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #fff;
      margin-bottom: 16px;
    }

    .page-hero h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .page-hero p {
      color: rgba(255,255,255,0.88);
      font-size: 1rem;
      line-height: 1.55;
      max-width: 680px;
    }

    .coming-soon-block {
      background: #fff;
      border-radius: 16px;
      border: 2px dashed #c7d7f0;
      padding: 80px 40px;
      text-align: center;
      color: #64748b;
    }

    .coming-soon-block .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .coming-soon-block h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    .coming-soon-block p {
      font-size: 0.95rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="page-wrap">
    <div class="page-hero wrapped">
      <div class="hero-pill">Поток создания ценности</div>
      <h1>Фильтрация</h1>
      <p>Раздел находится в разработке.</p>
    </div>

    <div class="coming-soon-block">
      <div class="icon">🔍</div>
      <h2>Раздел в разработке</h2>
      <p>Содержимое будет добавлено позже.</p>
    </div>
  </div>

  <script src="nav.js"></script>
</body>
</html>
